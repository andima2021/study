services:
  web:
    image: nginx:latest
    container_name: my-nginx
    networks:
      - monitoring-net
    ports:
      - "8081:80"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: my-grafana
    networks:
      - monitoring-net
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - grafana-data:/var/lib/grafana
  mysql:
    image: mysql:latest
    container_name: my-mysql
    networks:
      - monitoring-net
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: testdb
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass123
    ports:
      - "3306:3306"
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    container_name: my-portainer
    networks:
      - monitoring-net
    ports:
      - "8000:8000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: my-prometheus
    networks:
      - monitoring-net
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: my-node-exporter
    networks:
      - monitoring-net
    ports:
      - "9100:9100"
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: my-cadvisor
    networks:
      - monitoring-net
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    restart: unless-stopped

volumes:
  portainer-data:
  grafana-data:

networks:
  monitoring-net:
    driver: bridge
